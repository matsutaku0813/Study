<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>松浦 拓哉 | Portfolio</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header__inner">
        <div>
          <p class="pill">Frontend / Web（学習中）</p>
          <h1 class="hero__title">松浦 拓哉</h1>
          <p class="hero__lead">
            HTML / CSS / JavaScript
            を中心に学習中。小さく作って公開し、改善を積み重ねています。
          </p>
        </div>

        <button
          id="themeToggle"
          class="button"
          type="button"
          aria-pressed="false"
        >
          🌙 Dark
        </button>
      </div>
    </header>

    <main class="container">
      <section id="about" class="card">
        <h2>About</h2>
        <p>
          こんにちは、松浦
          拓哉です。今はHTML/CSS/JavaScriptを学習中で、自己紹介サイトを作っています。
        </p>
      </section>

      <section id="skills" class="card">
        <h2>Skills</h2>
        <ul class="tags">
          <li class="tag">HTML</li>
          <li class="tag">CSS</li>
          <li class="tag">JavaScript</li>
        </ul>
      </section>

      <section id="works" class="card">
        <h2>Works</h2>
        <div class="works">
          <a
            class="work"
            href="https://www.yahoo.co.jp/"
            target="_blank"
            rel="noreferrer"
          >
            <div class="work__title">Project 1</div>
            <div class="work__desc">ここに説明</div>
          </a>
          <a
            class="work"
            href="https://sushida.net/play.html"
            target="_blank"
            rel="noreferrer"
          >
            <div class="work__title">Project 2</div>
            <div class="work__desc">ここに説明</div>
          </a>
        </div>
      </section>

      <section id="contact" class="card">
        <h2>Contact</h2>
        <form id="contactForm" class="form">
          <label>
            お名前
            <input id="nameInput" type="text" autocomplete="name" />
          </label>

          <label>
            メッセージ
            <textarea id="msgInput" rows="4"></textarea>
          </label>

          <p id="formMsg" class="formMsg" aria-live="polite"></p>

          <button class="button" type="submit">送信（ダミー）</button>
        </form>
      </section>

      <footer class="footer">
        <small>© <span id="year"></span> Your Name</small>
      </footer>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
