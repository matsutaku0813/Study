<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>自己紹介 | Your Name</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <div>
        <h1 class="title">Your Name</h1>
        <p class="subtitle">Frontend Learner</p>
      </div>

      <button id="themeToggle" class="button" type="button" aria-pressed="false">
        🌙 Dark
      </button>
    </div>
  </header>

  <main class="container">
    <section id="about" class="card">
      <h2>About</h2>
      <p>
        こんにちは、〇〇です。今はHTML/CSS/JavaScriptを学習中で、自己紹介サイトを作っています。
      </p>
    </section>

    <section id="skills" class="card">
      <h2>Skills</h2>
      <ul class="tags">
        <li class="tag">HTML</li>
        <li class="tag">CSS</li>
        <li class="tag">JavaScript</li>
      </ul>
    </section>

    <section id="works" class="card">
      <h2>Works</h2>
      <div class="works">
        <a class="work" href="#" target="_blank" rel="noreferrer">
          <div class="work__title">Project 1</div>
          <div class="work__desc">ここに説明</div>
        </a>
        <a class="work" href="#" target="_blank" rel="noreferrer">
          <div class="work__title">Project 2</div>
          <div class="work__desc">ここに説明</div>
        </a>
      </div>
    </section>

    <section id="contact" class="card">
      <h2>Contact</h2>
      <form id="contactForm" class="form">
        <label>
          お名前
          <input id="nameInput" type="text" autocomplete="name" />
        </label>

        <label>
          メッセージ
          <textarea id="msgInput" rows="4"></textarea>
        </label>

        <p id="formMsg" class="formMsg" aria-live="polite"></p>

        <button class="button" type="submit">送信（ダミー）</button>
      </form>
    </section>

    <footer class="footer">
      <small>© <span id="year"></span> Your Name</small>
    </footer>
  </main>

  <script src="./main.js"></script>
</body>
</html>
